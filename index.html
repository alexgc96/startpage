<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Startpage</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

</head>
<body>

<!-- Notes panel (left) — toggle with [ -->
<div class="side-panel notes-panel" id="notesPanel">
    <div class="panel-header">// notes</div>
    <div class="note-input-area">
        <textarea id="noteInput" placeholder="write something..." rows="3"></textarea>
        <button id="saveNote">save</button>
    </div>
    <div class="note-filter-area">
        <input type="text" id="noteFilter" placeholder="filter..." autocomplete="off" spellcheck="false" />
    </div>
    <div class="notes-list" id="notesList"></div>
</div>

<!-- Tasks panel (right) — toggle with ] -->
<div class="side-panel tasks-panel" id="tasksPanel">
    <div class="panel-header">// tasks</div>
    <div class="task-input-area">
        <input type="text" id="taskInput" placeholder="add task..." autocomplete="off" spellcheck="false" />
        <input type="date" id="taskDue" />
        <button id="addTask">add</button>
    </div>
    <div class="tasks-list" id="tasksList"></div>
</div>

<!-- Backdrop dims the page when search is open -->
<div class="search-backdrop" id="searchBackdrop"></div>

<!-- Search overlay — any printable key (except [ ]) -->
<div class="search-overlay" id="searchOverlay">
    <span class="search-prompt">&gt;&nbsp;</span>
    <input type="text" class="search-input" id="searchInput" autocomplete="off" spellcheck="false" />
</div>

<!-- Help modal — toggle with ? -->
<div class="help-backdrop" id="helpBackdrop"></div>
<div class="help-modal" id="helpModal">
    <div class="help-header">// keyboard shortcuts</div>
    <table class="help-table">
        <tr>
            <td class="help-key">[</td>
            <td class="help-action">toggle notes</td>
        </tr>
        <tr>
            <td class="help-key">]</td>
            <td class="help-action">toggle tasks</td>
        </tr>
        <tr>
            <td class="help-key">t</td>
            <td class="help-action">cycle themes</td>
        </tr>
        <tr>
            <td class="help-key">?</td>
            <td class="help-action">toggle help</td>
        </tr>
        <tr>
            <td class="help-key">Esc</td>
            <td class="help-action">close all</td>
        </tr>
        <tr>
            <td class="help-key">any letter</td>
            <td class="help-action">search</td>
        </tr>
    </table>
</div>

<header class="cursor header">
    <a href="https://blenderartists.org/u/alexgc96/summary" target="_blank">Howdy Alex.</a>
</header>

<main>
    <div class="clock">
        <span class="time">xx:xx</span>
        <span class="ampm">AM</span>
    </div>

    <div class="date">Tue 31 mar</div>

    <a class="weather-link" href="https://weather.com/weather/today/l/f892fcc57d89c40589a3d92f0249159d86b112424bdb14837d50500ff4456949" target="_blank">
    <div class="weather">
        loading wx..
    </div>
   </a>
</main>
        <script src="script.js"></script>

<div class="shortcuts">
    <a href="notion://" target="_blank" title="Notion">
        <svg viewBox="0 0 100 100" class="icon"><use href="#notion-logo"/></svg>
    </a>
    <a href="iterm2://" target="_blank" title="Terminal">
        <svg viewBox="0 0 100 100" class="icon"><use href="#terminal-logo"/></svg>
    </a>
    <a href="vscode://" target="_blank" title="VScode">
        <svg viewBox="0 0 100 100" class="icon"><use href="#vscode-logo"/></svg>
    </a>
</div>
<div class="shortcuts2">
    <a href="https://github.com" target="_blank" title="Github">
        <svg viewBox="0 0 100 100" class="icon"><use href="#github-logo"/></svg>
    </a>
    <a href="https://www.blogger.com" target="_blank" title="Blogger">
        <svg viewBox="0 0 100 100" class="icon"><use href="#blogger-logo"/></svg>
    </a>
    <a href="https://www.youtube.com" target="_blank" title="Youtube">
        <svg viewBox="0 0 100 100" class="icon"><use href="#youtube-logo"/></svg>
    </a>
</div>
